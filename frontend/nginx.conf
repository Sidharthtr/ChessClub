server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────────────────
    # Cuts JS/CSS transfer sizes by ~70%. Only text-based types — already-
    # compressed formats (images, woff2) are excluded.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options "nosniff"                      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Static asset caching ──────────────────────────────────────────────────
    # Vite hashes filenames (main-Bx3kL9.js) so they are safe to cache forever.
    # index.html is NOT cached so users always get the latest shell.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── WebSocket proxy ───────────────────────────────────────────────────────
    # The backend WebSocket server listens at path /ws (ws.WebSocketServer path: '/ws').
    # Using a dedicated path keeps this clean — nginx can proxy /ws without
    # any conflict with static file serving at /.
    #
    # proxy_read_timeout 3600s: a chess game can last an hour; without this nginx
    # would close the WS connection after its default 60-second idle timeout.
    location /ws {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;

        # These two headers are mandatory for the HTTP→WS upgrade handshake.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── REST API proxy ────────────────────────────────────────────────────────
    # /api/* is forwarded to the backend. Docker's DNS resolves "backend" to
    # the backend container IP automatically within the shared network.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    # Every route not matched above (e.g. /login, /game) falls back to index.html
    # so React Router handles the navigation instead of nginx returning 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
