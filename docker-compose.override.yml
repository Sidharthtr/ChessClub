# Local development overrides — applied automatically by Docker Compose on top
# of docker-compose.yml when you run `docker compose up` without -f flags.
#
# In production (CI/CD), use:
#   docker compose -f docker-compose.yml up
# to skip this file entirely.
#
# This file ONLY adds host-port exposures so you can curl/connect tools directly.
# It does NOT override the production CMD — the container runs the compiled
# JS just like in prod. If you want host-side hot-reload while editing backend
# code, run the backend directly on the host with `npm start` and skip Docker
# for the backend container.

services:

  postgres:
    # Expose PostgreSQL on the host so you can connect with a DB GUI
    # (TablePlus, pgAdmin, DBeaver) or run `npx prisma studio` outside Docker.
    ports:
      - "5432:5432"

  backend:
    # Expose backend port for direct testing (curl, Postman, /metrics, /health)
    ports:
      - "8080:8080"

  frontend:
    ports:
      - "${FRONTEND_PORT:-80}:80"
