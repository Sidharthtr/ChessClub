# Production-representative Docker Compose.
# For local development overrides see docker-compose.override.yml.
# Environment variables are loaded from .env at the project root.

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-chessclub}
      POSTGRES_USER:     ${POSTGRES_USER:-chess}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      # Named volume: data survives `docker compose down` but not `down --volumes`
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Backend's depends_on waits for this to pass before starting.
      # -U must match POSTGRES_USER above.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chess} -d ${POSTGRES_DB:-chessclub}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - chessclub

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV:     production
      PORT:         8080
      DATABASE_URL: postgresql://${POSTGRES_USER:-chess}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-chessclub}
      JWT_SECRET:   ${JWT_SECRET:?JWT_SECRET must be set in .env}
      CORS_ORIGIN:  ${CORS_ORIGIN:-http://localhost}
    depends_on:
      postgres:
        # Docker will not start backend until the postgres healthcheck passes.
        # This prevents "ECONNREFUSED" on the first migration run.
        condition: service_healthy
    networks:
      - chessclub
    # Backend is NOT exposed to the host — it is only reachable via nginx.
    # This enforces that all traffic goes through the reverse proxy.

  # ── Frontend / nginx ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Pass the API URLs to Vite at build time.
      # /api and empty WS URL means nginx proxies both (relative to the page host).
      args:
        VITE_API_URL: /api
        VITE_WS_URL:  ""
    restart: unless-stopped
    ports:
      # Expose nginx on port 80. Map to a different host port if needed: "8081:80"
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - chessclub

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    # Data persists between `docker compose up/down` but is removed by `down --volumes`

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  chessclub:
    # Custom bridge network so containers resolve each other by service name
    # (e.g. nginx can reach the backend at http://backend:8080)
    driver: bridge
